    <path d="M69 55.5c-4-4.3-10.1-1.1-10.1 4.1 0 4.5 3.9 7.6 10.1 11.7 6.2-4.1 10.1-7.2 10.1-11.7 0-5.2-6.1-8.4-10.1-4.1Z" fill="#FFFFFF"/>
